# Day 1 baseline: rank=8, alpha=16
model_name: "Qwen/Qwen2-VL-2B-Instruct"
dataset: "HuggingFaceM4/VQAv2"
dataset_split: "validation"
sample_size: 5000        # 4000 train / 1000 eval
seed: 42

lora:
  r: 8
  lora_alpha: 16
  lora_dropout: 0.05
  target_modules: ["q_proj", "v_proj"]
  bias: "none"
  task_type: "CAUSAL_LM"

training:
  num_train_epochs: 1
  per_device_train_batch_size: 4
  per_device_eval_batch_size: 4
  gradient_accumulation_steps: 4   # effective batch = 16
  learning_rate: 2.0e-4
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.05
  bf16: true
  logging_steps: 50
  eval_steps: 200
  save_steps: 500
  output_dir: "outputs/baseline_r8"
  report_to: "none"                # switch to "wandb" if available
